<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zipsa Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a4e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        .header .badge {
            font-size: 0.7rem;
            background: #4a4a8e;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: #4a4a8e;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #2a2a4e;
            border-bottom-left-radius: 4px;
        }
        .meta {
            font-size: 0.75rem;
            color: #888;
            padding: 0 0.5rem;
        }
        .meta-details {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #666;
            background: #16162a;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
        }
        .meta-details summary {
            outline: none;
            list-style: none;
        }
        .meta-details summary::-webkit-details-marker {
            display: none;
        }
        .meta-details[open] summary {
            margin-bottom: 0.5rem;
        }
        .meta-details .detail-row {
            padding: 0.25rem 0;
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }
        .meta-details .icon {
            flex-shrink: 0;
        }
        .trace-details {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #888;
        }
        .trace-details summary {
            cursor: pointer;
            outline: none;
            list-style: none;
            color: #666;
            user-select: none;
        }
        .trace-details summary::-webkit-details-marker {
            display: none;
        }
        .trace-details summary:hover {
            color: #888;
        }
        .trace-details[open] summary {
            margin-bottom: 0.5rem;
        }
        .trace-details .trace-list {
            background: #16162a;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            list-style: none;
        }
        .trace-details .trace-list li {
            padding: 0.25rem 0;
            border-bottom: 1px solid #2a2a4e;
        }
        .trace-details .trace-list li:last-child {
            border-bottom: none;
        }
        .input-area {
            padding: 1rem;
            border-top: 1px solid #2a2a4e;
            display: flex;
            gap: 0.5rem;
        }
        .input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            background: #16162a;
            color: #e8e8e8;
            font-size: 1rem;
            outline: none;
        }
        .input-area input:focus {
            border-color: #5a5aae;
        }
        .input-area input::placeholder {
            color: #666;
        }
        .input-area button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #5a5aae;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover:not(:disabled) {
            background: #6a6abe;
        }
        .input-area button:disabled {
            background: #3a3a5e;
            cursor: not-allowed;
        }
        .loading {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem;
        }
        .loading span {
            width: 8px;
            height: 8px;
            background: #5a5aae;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: #888;
        }
        .welcome h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #aaa;
        }
        .welcome p {
            font-size: 0.9rem;
        }
        @media (max-width: 600px) {
            .message {
                max-width: 95%;
            }
            .header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Zipsa</h1>
        <span class="badge">Privacy Gateway</span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <h2>Welcome to Zipsa</h2>
            <p>Your queries are processed locally first. Sensitive data stays private.</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const sessionId = 'session_' + Math.random().toString(36).substring(2, 15);
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isFirstMessage = true;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessage(role, content, metadata = null) {
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            messageDiv.appendChild(bubble);

            if (role === 'assistant' && metadata) {
                const details = document.createElement('details');
                details.className = 'meta-details';

                const summary = document.createElement('summary');
                summary.textContent = 'Details';
                details.appendChild(summary);

                const detailContent = document.createElement('div');

                // PII info
                if (metadata.pii_detected && metadata.pii_types && metadata.pii_types.length > 0) {
                    const piiRow = document.createElement('div');
                    piiRow.className = 'detail-row';
                    piiRow.innerHTML = `<span class="icon">🔒</span><span>PII detected: ${escapeHtml(metadata.pii_types.join(', '))} — removed before sending</span>`;
                    detailContent.appendChild(piiRow);
                }

                // Provider info
                const routeRow = document.createElement('div');
                routeRow.className = 'detail-row';
                const routeLabel = metadata.provider === 'local' ? 'local' : 'hybrid';
                routeRow.innerHTML = `<span class="icon">🔀</span><span>Routed to: ${routeLabel}</span>`;
                detailContent.appendChild(routeRow);

                // Reformulated query (if hybrid)
                if (metadata.reformulated_query) {
                    const queryRow = document.createElement('div');
                    queryRow.className = 'detail-row';
                    queryRow.innerHTML = `<span class="icon">✏️</span><span>Sent to cloud as: ${escapeHtml(metadata.reformulated_query)}</span>`;
                    detailContent.appendChild(queryRow);
                }

                // Latency
                if (metadata.latency_ms) {
                    const latencyRow = document.createElement('div');
                    latencyRow.className = 'detail-row';
                    latencyRow.innerHTML = `<span class="icon">⏱️</span><span>${Math.round(metadata.latency_ms)}ms</span>`;
                    detailContent.appendChild(latencyRow);
                }

                details.appendChild(detailContent);
                messageDiv.appendChild(details);

                // "How it worked" trace section
                if (metadata.trace && metadata.trace.length > 0) {
                    const traceDetails = document.createElement('details');
                    traceDetails.className = 'trace-details';

                    const traceSummary = document.createElement('summary');
                    traceSummary.textContent = 'How it worked';
                    traceDetails.appendChild(traceSummary);

                    const traceList = document.createElement('ul');
                    traceList.className = 'trace-list';
                    metadata.trace.forEach(step => {
                        const li = document.createElement('li');
                        li.textContent = step;
                        traceList.appendChild(li);
                    });
                    traceDetails.appendChild(traceList);
                    messageDiv.appendChild(traceDetails);
                }
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function addLoading() {
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            userInput.value = '';
            sendBtn.disabled = true;
            userInput.disabled = true;

            addMessage('user', query);
            addLoading();

            try {
                const response = await fetch('/relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_query: query,
                        session_id: sessionId
                    })
                });

                removeLoading();

                if (!response.ok) {
                    const error = await response.json();
                    addMessage('assistant', `Error: ${error.detail || 'Something went wrong'}`);
                    return;
                }

                const data = await response.json();
                const metadata = {
                    provider: data.provider,
                    pii_detected: data.pii_detected,
                    pii_types: data.pii_types,
                    reformulated_query: data.steps?.reformulated_query,
                    latency_ms: data.latency_ms,
                    trace: data.trace
                };
                addMessage('assistant', data.final_answer, metadata);
            } catch (err) {
                removeLoading();
                addMessage('assistant', `Error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        userInput.focus();
    </script>
</body>
</html>
