services:
  ollama:
    image: ollama/ollama:latest
    container_name: zipsa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30

  zipsa:
    build: .
    container_name: zipsa
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama-models:
